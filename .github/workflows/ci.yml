name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@v3
        with:
          upload: false
          output: sarif-results

      - name: Severity gate
        run: |
          SARIF_FILE=$(ls sarif-results/*.sarif 2>/dev/null | head -1)

          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found — nothing to check."
            exit 0
          fi

          echo "SARIF file: $SARIF_FILE"
          echo "Total results: $(jq '[.runs[].results[]?] | length' "$SARIF_FILE")"
          echo "Distinct levels found: $(jq '[.runs[].results[]?.level] | unique' "$SARIF_FILE")"
          echo "First result sample:"
          jq '.runs[].results[0]' "$SARIF_FILE" 2>/dev/null | head -30
          echo "First result properties:"
          jq '.runs[].results[0].properties' "$SARIF_FILE" 2>/dev/null
          echo "Rule index → severity mapping (sample):"
          jq '[.runs[].tool.driver.rules[]? | {id, severity: .properties."problem.severity"}] | .[0:5]' "$SARIF_FILE" 2>/dev/null

          # Build rule-index → severity map from driver rules
          HIGH=$(jq '
            (
              [.runs[].tool.driver.rules[]? | {
                key: (.id // .index | tostring),
                sev: (.properties."problem.severity" // "unknown")
              }] | from_entries
            ) as $rule_sev |
            [.runs[].results[]? | select($rule_sev[.ruleId] == "error")] | length
          ' "$SARIF_FILE" 2>/dev/null || echo 0)
          MEDIUM=$(jq '
            (
              [.runs[].tool.driver.rules[]? | {
                key: (.id // .index | tostring),
                sev: (.properties."problem.severity" // "unknown")
              }] | from_entries
            ) as $rule_sev |
            [.runs[].results[]? | select($rule_sev[.ruleId] == "warning")] | length
          ' "$SARIF_FILE" 2>/dev/null || echo 0)
          LOW=$(jq '
            (
              [.runs[].tool.driver.rules[]? | {
                key: (.id // .index | tostring),
                sev: (.properties."problem.severity" // "unknown")
              }] | from_entries
            ) as $rule_sev |
            [.runs[].results[]? | select($rule_sev[.ruleId] == "recommendation" or $rule_sev[.ruleId] == "note")] | length
          ' "$SARIF_FILE" 2>/dev/null || echo 0)

          echo "::group::CodeQL Severity Summary"
          echo "High/Critical  : $HIGH"
          echo "Medium/Warning : $MEDIUM"
          echo "Low/Note       : $LOW"
          echo "::endgroup::"

          if [ "$LOW" -gt 0 ]; then
            echo "::warning::Found ${LOW} low severity issue(s). Review recommended, CI passes."
          fi

          if [ "$MEDIUM" -gt 0 ]; then
            echo "::warning::Found ${MEDIUM} medium severity issue(s). Review recommended."
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Found ${HIGH} high/critical severity issue(s). CI BLOCKED. Fix before merging."
            exit 1
          fi

          echo "No high severity issues. CodeQL gate passed."

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results
