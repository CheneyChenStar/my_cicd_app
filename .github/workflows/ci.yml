name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Severity gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF="refs/heads/${{ github.ref_name }}"
          echo "Querying Code Scanning API for open alerts on $REF ..."

          HIGH=$(gh api "repos/$GITHUB_REPOSITORY/code-scanning/alerts?ref=$REF&state=open&severity=critical,high" \
            --jq 'length' 2>/dev/null || echo 0)
          MEDIUM=$(gh api "repos/$GITHUB_REPOSITORY/code-scanning/alerts?ref=$REF&state=open&severity=medium" \
            --jq 'length' 2>/dev/null || echo 0)
          LOW=$(gh api "repos/$GITHUB_REPOSITORY/code-scanning/alerts?ref=$REF&state=open&severity=low,note" \
            --jq 'length' 2>/dev/null || echo 0)

          echo "::group::CodeQL Severity Summary"
          echo "High/Critical  : $HIGH"
          echo "Medium         : $MEDIUM"
          echo "Low/Note       : $LOW"
          echo "::endgroup::"

          if [ "$LOW" -gt 0 ]; then
            echo "::warning::Found ${LOW} low severity issue(s). Review recommended, CI passes."
          fi

          if [ "$MEDIUM" -gt 0 ]; then
            echo "::warning::Found ${MEDIUM} medium severity issue(s). Review recommended."
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Found ${HIGH} high/critical severity issue(s). CI BLOCKED. Fix before merging."
            exit 1
          fi

          echo "No high severity issues. CodeQL gate passed."
